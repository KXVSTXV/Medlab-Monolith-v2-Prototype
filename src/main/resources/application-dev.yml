#  h2:
#    console:
#      enabled: false

# -----------------------------------------------------------------------------
#  H2 — default (in-memory; Flyway off; DevDataLoader seeds data)
# -----------------------------------------------------------------------------
spring:
  datasource:
    url: jdbc:h2:mem:medlab_db;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER,VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  thymeleaf:
    cache: false

  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    enabled: true
    path: /v3/api-docs

app:
  jwt:
    expiration-ms: 86400000
  data-loader:
    enabled: true

logging:
  level:
    com.cognizant.medlab: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# -----------------------------------------------------------------------------
#  MySQL overrides — active only when: --spring.profiles.active=dev,dev-mysql
# -----------------------------------------------------------------------------
---
spring:
  config:
    activate:
      on-profile: dev-mysql
  datasource:
    url: jdbc:mysql://localhost:3306/medlab_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  thymeleaf:
    cache: false
  h2:
    console:
      enabled: false
