# =============================================================================
#  Dev profile — pick ONE database
# =============================================================================
#
#  Default below: H2 in-memory (no local MySQL required).
#
#  MySQL (e.g. office), choose one:
#    • RECOMMENDED: run with both profiles
#        --spring.profiles.active=dev,dev-mysql
#      (second document at bottom of this file applies datasource + Flyway).
#    • OR: comment out the entire "H2 — default" `spring:` block, then uncomment
#      the full "MySQL" block near the top (keep a single active `spring:` tree).
#
#  Run H2-only with: --spring.profiles.active=dev
#
#  MySQL prep: create DB if missing (or rely on createDatabaseIfNotExist=true in
#  the JDBC URL). First startup runs Flyway V1/V2 (schema + seed users; passwords
#  match login hint Admin@123).
#
# =============================================================================

server:
  port: 8081

# -----------------------------------------------------------------------------
#  MySQL — entire block stays commented by default. Uncomment only after
#  commenting out the "H2 — default" `spring:` block below (YAML allows one
#  merged `spring` map; a second bare `spring:` key would override the first).
# -----------------------------------------------------------------------------
#spring:
#  datasource:
#    url: jdbc:mysql://localhost:3306/medlab_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true&characterEncoding=utf8
#    username: root
#    password: root
#    driver-class-name: com.mysql.cj.jdbc.Driver
#  jpa:
