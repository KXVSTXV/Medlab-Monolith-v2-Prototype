spring:
  datasource:
    #url: jdbc:h2:mem:medlab_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    url: jdbc:h2:mem:medlab_db;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER,VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update           # Let Hibernate create the tables since Flyway is off
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false               # Disable Flyway for now to avoid syntax errors

  thymeleaf:
    cache: false                # hot-reload in dev

  h2:
    console:
      enabled: true              # This lets you see the DB in your browser
      path: /h2-console

# Swagger enabled in dev
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    enabled: true
    path: /v3/api-docs

app:
  jwt:
    expiration-ms: 86400000     # 24 h — relaxed for dev
  data-loader:
    enabled: true               # seeds sample data on startup

logging:
  level:
    com.cognizant.medlab: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
