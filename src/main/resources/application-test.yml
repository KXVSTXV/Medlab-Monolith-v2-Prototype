spring:
  datasource:
    url: jdbc:h2:mem:medlab_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=USER,VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop     # Hibernate creates schema from entities; no Flyway needed
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false              # H2 in-memory — Hibernate manages schema in tests

  h2:
    console:
      enabled: true

# Swagger disabled in tests (speeds up context load)
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

app:
  jwt:
    secret: test-secret-key-for-unit-testing-only-not-for-production
    expiration-ms: 3600000      # 1 h
  data-loader:
    enabled: false

logging:
  level:
    com.cognizant.medlab: WARN
    org.springframework.security: WARN
