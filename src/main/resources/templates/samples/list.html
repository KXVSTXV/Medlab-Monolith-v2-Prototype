<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Samples')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="app-layout">
  <aside th:replace="~{fragments/layout :: sidebar}"></aside>
  <main class="main-content">
    <div class="page-header"><h2><i class="fa fa-vial"></i> Samples</h2></div>
    <div class="card">
      <div class="card-body">
        <table class="table">
          <thead><tr><th>ID</th><th>Barcode</th><th>Type</th><th>Status</th></tr></thead>
          <tbody>
            <tr th:each="s : ${samples}">
              <td th:text="${s.id}"></td>
              <td th:text="${s.barcode}"></td>
              <td th:text="${s.specimenType}"></td>
              <td th:text="${s.status}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(samples.content)}">
              <td colspan="4" class="text-center text-muted">No samples found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
</body>
</html>
