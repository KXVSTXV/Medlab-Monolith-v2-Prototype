<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Test Orders')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="app-layout">
  <aside th:replace="~{fragments/layout :: sidebar}"></aside>
  <main class="main-content">
    <div class="page-header"><h2><i class="fa fa-clipboard-list"></i> Test Orders</h2></div>
    <div class="card">
      <div class="card-body">
        <table class="table">
          <thead><tr><th>ID</th><th>Patient</th><th>Test</th><th>Status</th></tr></thead>
          <tbody>
            <tr th:each="o : ${orders}">
              <td th:text="${o.id}"></td>
              <td th:text="${o.sample?.appointment?.patient?.fullName}"></td>
              <td th:text="${o.labTest?.name}"></td>
              <td th:text="${o.status}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(orders.content)}">
              <td colspan="3" class="text-center text-muted">No test orders found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
</body>
</html>
