<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Notifications')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="app-layout">
  <aside th:replace="~{fragments/layout :: sidebar}"></aside>
  <main class="main-content">
    <div class="page-header"><h2><i class="fa fa-bell"></i> Notifications</h2></div>
    <div class="card">
      <div class="card-body">
        <table class="table">
          <thead><tr><th>ID</th><th>Message</th><th>Type</th><th>Status</th></tr></thead>
          <tbody>
            <tr th:each="n : ${notifications}">
              <td th:text="${n.id}"></td>
              <td th:text="${n.message}"></td>
              <td th:text="${n.type}"></td>
              <td th:text="${n.status}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(notifications.content)}">
              <td colspan="4" class="text-center text-muted">No notifications found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
</body>
</html>
