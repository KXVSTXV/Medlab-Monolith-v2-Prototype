<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Patients')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="app-layout">
  <aside th:replace="~{fragments/layout :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-header">
      <h2><i class="fa fa-users"></i> Patients</h2>
      <a th:href="@{/ui/patients/new}" class="btn btn-primary"
         sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_RECEPTION')">
        <i class="fa fa-user-plus"></i> Register Patient
      </a>
    </div>

    <div th:replace="~{fragments/layout :: flash}"></div>

    <!-- Search bar -->
    <div class="card mb-3">
      <div class="card-body search-bar">
        <form th:action="@{/ui/patients}" method="get" class="search-form">
          <input type="text" name="search" class="form-control"
                 placeholder="Search by name, email, mobile or MRN…"
                 th:value="${search}"/>
          <button type="submit" class="btn btn-primary">
            <i class="fa fa-search"></i> Search
          </button>
          <a th:href="@{/ui/patients}" class="btn btn-outline">Clear</a>
        </form>
      </div>
    </div>

    <!-- Patient table -->
    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>MRN</th>
              <th>Full Name</th>
              <th>DOB</th>
              <th>Gender</th>
              <th>Mobile</th>
              <th>Status</th>
              <th>Consent</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${patients.content.isEmpty()}">
              <td colspan="8" class="text-center text-muted">No patients found.</td>
            </tr>
            <tr th:each="p : ${patients.content}">
              <td><code th:text="${p.medicalRecordNumber}"></code></td>
              <td>
                <a th:href="@{/ui/patients/{id}(id=${p.id})}"
                   th:text="${p.fullName}" class="text-link"></a>
              </td>
              <td th:text="${p.dob != null ? #temporals.format(p.dob,'dd MMM yyyy') : '—'}"></td>
              <td th:text="${p.gender}"></td>
              <td th:text="${p.mobileNumber ?: '—'}"></td>
              <td>
                <span class="badge"
                      th:classappend="${p.status.name() == 'ACTIVE'} ? 'badge-success' : 'badge-secondary'"
                      th:text="${p.status}"></span>
              </td>
              <td>
                <span th:if="${p.consentGiven}" class="badge badge-success">Yes</span>
                <span th:unless="${p.consentGiven}" class="badge badge-warning">No</span>
              </td>
              <td class="actions">
                <a th:href="@{/ui/patients/{id}(id=${p.id})}"
                   class="btn btn-sm btn-outline" title="View">
                  <i class="fa fa-eye"></i>
                </a>
                <button class="btn btn-sm btn-danger"
                        sec:authorize="hasAuthority('ROLE_ADMIN')"
                        th:onclick="|deletePatient(${p.id})|" title="Delete">
                  <i class="fa fa-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div th:replace="~{fragments/layout :: pagination(${patients}, '/ui/patients')}"></div>

  </main>
</div>
<script>
function deletePatient(id) {
  if (!confirm('Soft-delete patient #' + id + '? This action can be reversed by an admin.')) return;
  apiFetch('/api/patients/' + id, { method: 'DELETE' })
    .then(() => location.reload())
    .catch(e => alert('Error: ' + e.message));
}
</script>
</body>
</html>
