spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: true

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000      # 1 h in stage
  data-loader:
    enabled: false

logging:
  level:
    com.cognizant.medlab: INFO
    org.springframework.security: INFO
