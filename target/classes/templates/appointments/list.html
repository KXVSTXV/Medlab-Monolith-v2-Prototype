<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Appointments')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="app-layout">
  <aside th:replace="~{fragments/layout :: sidebar}"></aside>
  <main class="main-content">
    <div class="page-header">
      <h2><i class="fa fa-calendar-check"></i> Appointments</h2>
      <a th:href="@{/ui/appointments/new}" class="btn btn-primary"><i class="fa fa-plus"></i> New Appointment</a>
    </div>
    <div class="card">
      <div class="card-body">
        <table class="table">
          <thead><tr><th>ID</th><th>Patient</th><th>Date</th><th>Status</th></tr></thead>
          <tbody>
            <tr th:each="a : ${appointments}">
              <td th:text="${a.id}"></td>
              <td th:text="${a.patient?.fullName}"></td>
              <td th:text="${#temporals.format(a.scheduledAt, 'dd MMM yyyy HH:mm')}"></td>
              <td th:text="${a.status}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(appointments.content)}">
              <td colspan="4" class="text-center text-muted">No appointments found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
</body>
</html>
